<section id="cv" class="cv-section">
  <div class="cv-heading">
    <app-section-title
      eyebrow="CV"
      [title]="cv.title"
      [description]="cv.description">
    </app-section-title>

    <a class="download-button" [href]="cv.file" [download]="cv.downloadName">
      Download CV
    </a>
  </div>

  <div class="pdf-frame" #viewer>
    <p class="pdf-message" *ngIf="isLoading">Loading CV...</p>
    <p class="pdf-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="pdf-pages" *ngIf="!errorMessage">
      <canvas
        #pageCanvas
        *ngFor="let page of pages"
        [attr.aria-label]="'CV page ' + page">
      </canvas>
    </div>
  </div>
</section>
