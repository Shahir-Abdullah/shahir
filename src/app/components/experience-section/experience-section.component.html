<section id="experience" class="experience-section">
  <app-section-title
    eyebrow="Experience"
    title="Work"
    description="Professional roles, product delivery, and engineering practice.">
  </app-section-title>

  <div class="timeline">
    <article class="experience-card" *ngFor="let item of experience">
      <div class="card-topline">
        <p>{{ item.period }}</p>
        <a [href]="item.href">{{ item.company }}</a>
      </div>
      <h3>{{ item.role }}</h3>
      <span>{{ item.summary }}</span>
      <ul>
        <li *ngFor="let tag of item.tags">{{ tag }}</li>
      </ul>
    </article>
  </div>
</section>
