<header class="site-header">
  <nav class="site-nav" aria-label="Primary navigation">
    <a class="brand" href="#about" (click)="closeMenu()">S. Abdullah</a>

    <button
      type="button"
      class="menu-button"
      [attr.aria-expanded]="menuOpen"
      aria-controls="primary-menu"
      aria-label="Toggle navigation"
      (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-links" id="primary-menu" [class.open]="menuOpen">
      <a *ngFor="let item of nav" [href]="'#' + item.target" (click)="closeMenu()">{{ item.label }}</a>
    </div>
  </nav>
</header>
