<section [id]="sectionId" class="carousel-section">
  <div class="carousel-heading">
    <app-section-title [eyebrow]="eyebrow" [title]="title"></app-section-title>

    <div class="carousel-controls">
      <button type="button" aria-label="Previous cards" (click)="scroll(-1)">&larr;</button>
      <button type="button" aria-label="Next cards" (click)="scroll(1)">&rarr;</button>
    </div>
  </div>

  <div
    #track
    class="card-track"
    (pointerdown)="startDrag($event)"
    (pointermove)="drag($event)"
    (pointerup)="endDrag($event)"
    (pointercancel)="endDrag($event)"
    tabindex="0">
    <article class="swipe-card" *ngFor="let item of items">
      <a *ngIf="item.href; else staticCard" [href]="item.href" (click)="guardClick($event)">
        <ng-container *ngTemplateOutlet="cardContent; context: { item: item }"></ng-container>
      </a>

      <ng-template #staticCard>
        <div>
          <ng-container *ngTemplateOutlet="cardContent; context: { item: item }"></ng-container>
        </div>
      </ng-template>
    </article>
  </div>
</section>

<ng-template #cardContent let-item="item">
  <p>{{ item.eyebrow }}</p>
  <h3>{{ item.title }}</h3>
  <span>{{ item.description }}</span>
  <ul>
    <li *ngFor="let tag of item.tags">{{ tag }}</li>
  </ul>
</ng-template>
